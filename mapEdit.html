<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>マップ</title>
        <link rel="stylesheet" href="./default.css">
        <script src="mapEdit.js" type="text/javascript">
        </script>
    </head>
    <body onload="init()">
        <h1>マップエディタ</h1>
        <p>
           <strong>～説明～</strong><br>
            以下の芝生に、自分で壁や通路を置くことでマップを作ることができます。<br>
            壁と通路はそれぞれ３種類用意してありますので、自分で使うブロックを選んでみましょう。
            画像を見て好きなものを選んだら、右隣にあるボタンをクリックしてみてください。
            そうすれば選択状態になりますので、芝生上の好きなところをクリックすることでマップを作っていくことができます。<br>
            リセットボタンを押すと画面を最初の芝生だけのマップに戻すこともできますよ。<br>
            迷路を作ってみるのも楽しいかもしれませんね。是非自分好みのマップを完成させてください！
        </p>
        <table id = "board"></table>
        <h2 id="info" style="display:none;"></h2>
        <br>
        
        <div id="yuka">
            <img src="yuka1.png"><button onclick="sblock('yuka1.png')">通路1</button>
            <br>
            <img src="yuka2.png"><button onclick="sblock('yuka2.png')">通路2</button>
            <br>
            <img src="yuka3.png"><button onclick="sblock('yuka3.png')">通路3</button>
        </div>
        <br>
        <div id="kabe">
            <img src="kabe1.png"><button onclick="sblock('kabe1.png')">壁　1</button>
            <br>
            <img src="kabe2.png"><button onclick="sblock('kabe2.png')">壁　2</button>
            <br>
            <img src="kabe3.png"><button onclick="sblock('kabe3.png')">壁　3</button>
        </div>

        <div id="re">
            <button onclick="reset()">リセット</button>
        </div>
       

<ul class="game">
    <li><a href="kadai.html">前のページに戻る</a></li>
</ul>
    </body>
</html>
